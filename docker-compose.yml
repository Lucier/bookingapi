services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U booking -d booking']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://booking:booking@db:5432/booking
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: on-failure

volumes:
  postgres_data:

networks:
  internal:
